/* --- その他装飾 --- */

.note-box { background-color: #fcfcfc; border: 1px solid #eee; padding: 15px 20px; margin: 40px 10px; font-size: 14px; color: #666; }

/* --- 画像拡大（ダイアログ）の設定 --- */
#imageDialog { padding: 0; border: none; background: transparent; }
#backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); z-index: -1; }
#largeImage { max-width: 90vw; max-height: 90vh; display: block; margin: auto; border: 3px solid white; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
.zoom-target { cursor: pointer; transition: opacity 0.3s; }

.nav-links a { text-decoration: none; font-size: 16px; color: #0055aa; }
.bottom-nav { text-align: center; padding-bottom: 40px; }

/* スマホ対応 */
@media (max-width: 600px) {
    .human { margin-left: 5%; }

<dialog id="imageDialog">
  <div id="backdrop"></div>
  <img id="largeImage" src="" alt="拡大画像">
</dialog>
  
<script>

// 画像拡大機能
const dialog = document.getElementById('imageDialog');
const largeImage = document.getElementById('largeImage');
const backdrop = document.getElementById('backdrop');

if (dialog && largeImage && backdrop) {
    document.querySelectorAll('.zoom-target').forEach(img => {
        img.onclick = () => {
            largeImage.src = img.src;
            dialog.showModal();
        };
    });

    backdrop.onclick = () => dialog.close();
}
</script>
