<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田中の城</title>
    <style>
        body {
            background-color: #fdfdfd; 
            color: #222222;           
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif; 
            line-height: 2.2;         
            /* 余白を小さく（左右5%）し、上下も調整 */
            padding: 40px 5%;         
            max-width: 100%; /* 横幅いっぱい使う */
            margin: 0;
            /* 文字サイズをスマホで読みやすい大きさに固定 */
            font-size: 18px; 
            word-wrap: break-word;
        }
        h1 { 
            font-size: 1.4rem; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 10px; 
            margin-top: 0;
        }
    </style>
</head>
<body>
    <h1>最初の断片</h1>
    <p>
        ここに、私の「、」を刻みます。
    </p>
    <p>
        広告も、ノイズもない。ここが私の、そしてあなたの「1号室」です。
    </p>
</body>
</html>
</body>
</html>
