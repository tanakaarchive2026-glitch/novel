<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>田中の城</title>
    <style>
        body {
            background-color: #fdfdfd; /* わずかに目に優しい白 */
            color: #222222;           /* 深みのある黒 */
            font-family: "Hiragino Mincho ProN", "MS Mincho", serif; /* 美しい明朝体 */
            line-height: 2.2;         /* 行間をたっぷり取って没入感を出す */
            padding: 15% 10%;         /* スマホで見た時に余白を持たせる */
            max-width: 650px;
            margin: auto;
            word-wrap: break-word;
        }
        h1 { font-size: 1.5rem; border-bottom: 1px solid #eee; padding-bottom: 1rem; }
    </style>
</head>
<body>
    <h1>最初の断片</h1>
    <p>
        ここに、私の「、」を刻みます。
    </p>
    <p>
        広告も、ノイズもない。ここが私の、そしてあなたの「1号室」です。
    </p>
</body>
</html>
