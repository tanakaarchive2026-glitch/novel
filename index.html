<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>田中の部屋</title>
    <style>
        /* ユニバーサルデザイン：目が疲れない白背景と黒文字 */
        body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 20px; color: #333; background: #fff; }
        
        /* サイトタイトル：DFPOP1体風の太字＋黄色の縁取り */
        .site-title { 
            text-align: center; font-size: 36px; margin-top: 40px;
            font-family: "Arial Black", "HGP創英角ﾎﾟｯﾌﾟ体", sans-serif; 
            color: #ffd700; 
            text-shadow: 2px 2px 0 #444, -1px -1px 0 #444, 1px -1px 0 #444, -1px 1px 0 #444, 1px 1px 0 #444;
        }
        
        /* 概要：スマホでも文の区切りで改行される設定 */
        .intro { text-align: center; margin: 30px 0; font-size: 16px; }
        .intro span { display: inline-block; } 

        /* イラスト配置用スペース（概要ボーダーの上） */
        .toys-box { text-align: center; margin-bottom: -10px; }
        .toys-box img { width: 120px; vertical-align: bottom; }

        /* 概要ボーダー（太線） */
        .border-main { border: 0; border-top: 4px solid #444; margin: 0 0 30px 0; }

        /* 検索バー（見た目のみ） */
        .search-area { text-align: center; margin-bottom: 40px; color: #888; }
        .search-bar { border: 1px solid #ccc; border-radius: 20px; padding: 5px 15px; width: 80%; max-width: 300px; display: inline-block; }
        .search-options { font-size: 14px; margin-top: 10px; }

        /* 中ゾーン：作品リスト（左寄せ） */
        .category { text-align: left; margin-bottom: 40px; }
        .category h2 { background: #ffd700; border-left: 8px solid #444; padding: 5px 15px; font-size: 20px; }
        .category ul { list-style: none; padding: 0; }
        .category li { margin: 12px 0; border-bottom: 1px dashed #ccc; }
        .category a { text-decoration: none; color: #0055aa; font-weight: bold; }

        /* 下ゾーン：初心の記録 */
        .archive-zone { background: #fefefe; border: 1px solid #eee; padding: 20px; margin-top: 60px; font-size: 15px; color: #666; }
        .archive-title { font-weight: bold; margin-bottom: 10px; color: #999; }

        /* 最下部の日付（Enterの代わり） */
        .footer-date { text-align: center; margin-top: 50px; font-size: 18px; color: #888; }
    </style>
</head>
<body>

    <h1 class="site-title">田中の部屋</h1>

    <div class="intro">
        <span>このサイトは、田中の小説や詩を置くところです。</span><br>
        <span>よくない表現が、ほんのちょっと入ってるかもしれません。</span><br>
        <span>部屋を明るくして、画面からはなれてみてください。</span><br>
        <span>わからなかったら、信頼できる大人にきいてください。</span>
    </div>

    <div class="toys-box">
        <img src="" alt="玩具箱の飾り">
    </div>

    <hr class="border-main">

    <div class="search-area">
        <div class="search-bar">🔍 ここから作品を検索できます</div>
        <div class="search-options">あいうえお順 | 作成年日順</div>
    </div>

    <div class="category">
        <h2>小説</h2>
        <ul>
            <li><a href="page2.html">ここに小説のタイトル（第2話以降への入口）</a></li>
        </ul>
    </div>
    <div class="category">
        <h2>詩</h2>
        <ul>
            <li><a href="poem1.html">ここに詩のタイトル</a></li>
        </ul>
    </div>
    <div class="category">
        <h2>その他</h2>
        <ul>
            <li><a href="misc1.html">日記・記録</a></li>
        </ul>
    </div>

    <div class="archive-zone">
        <div class="archive-title">↓以下、駄文</div>
        <p>（ここに昨日の「1号室」のくだりや、初めてHTMLを作った時の文言を復活させてください）</p>
        <p>ここに、私の「、」を刻みます。</p>
    </div>

    <div class="footer-date">2026/04/02</div>

</body>
</html>
