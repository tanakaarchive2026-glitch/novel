<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩具の部屋</title>
    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.8; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 15px; 
            color: #222; 
            background: #fff; 
        }

        /* 右上の「下へ」：標準フォント・細め */
        .jump-link {
            text-align: right;
            margin-bottom: 5px;
        }
        .jump-link a {
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-size: 13px;
            color: #777;
            background: #f0f0f0;
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 4px;
            font-weight: normal;
        }

        /* 本文タイトル：ゴシック・太字 */
        .content-title {
            font-family: sans-serif;
            font-size: 20px;
            font-weight: bold;
            margin: 10px 0 30px 0;
            color: #444;
        }

        /* 本文エリア：ゴシック・太字 */
        .novel-body {
            font-family: sans-serif; 
            font-size: 15.5px; 
            font-weight: bold;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #333;
        }

        /* 棒線：少し薄くし、角を丸める */
        .separator {
            border: 0;
            border-top: 1.5px solid #ddd;
            border-radius: 5px;
            margin: 20px 0 10px 0;
        }

        /* 下部ナビゲーション */
        .bottom-nav {
            text-align: center;
            padding-bottom: 40px;
        }
        .bottom-nav a {
            display: block;
            text-decoration: none;
        }

        /* ページの上へ：標準フォント・細め */
        .go-top { 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-size: 14px; 
            color: #777; 
            font-weight: normal;
            margin-bottom: 25px; /* 目次に戻るボタンとの間を1行あける */
        }

        /* トップへ戻る：標準フォント・細め・青色 */
        .back-to-top { 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
            font-size: 14px; 
            color: #0055aa; 
            font-weight: normal;
        }

    </style>
</head>
<body id="top">

    <div class="jump-link">
        <a href="#footer">▼ 下へ</a>
    </div>

    <h1 class="content-title">タイトル</h1>

    <div class="novel-body">
本文
    </div>

    <hr class="separator">

    <div class="bottom-nav" id="footer">
        <a href="#top" class="go-top">▲ ページの上へ</a>

        <a href="../index.html" class="back-to-top">トップへ戻る</a>
    </div>

</body>
</html>
