<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品名 - 田中の部屋</title>
    <style>
        body { 
            font-family: sans-serif; 
            line-height: 1.8; 
            max-width: 800px; 
            margin: 0 auto; 
            padding: 20px; 
            color: #222; 
            background: #fff; 
        }

        /* 作品タイトル：主役 */
        .novel-title { 
            font-size: 28px; 
            font-weight: bold; 
            margin: 20px 0 10px 0; 
            color: #444;
            border-bottom: 5px solid #f8b500; 
            border-radius: 3px; 
            display: inline-block; 
            padding-right: 15px;
            line-height: 1.3;
        }

        /* あらすじエリア */
        .story-summary { 
            background: #fdfdfd; 
            padding: 25px; 
            border: 1px solid #eee;
            border-left: 6px solid #f8b500; 
            border-radius: 4px; 
            margin: 30px 0 15px 0; 
            font-size: 16px; 
            color: #333; 
        }

        /* 「下へ」：脇役の濃さ。背景とのコントラストを適度に持たせる */
        .jump-link {
            text-align: right;
            margin-bottom: 30px;
        }
        .jump-link a {
            font-size: 14px;
            color: #777; /* 脇役の濃さ */
            background: #f0f0f0; /* 認識できる程度の薄いグレー */
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 4px;
            font-weight: bold;
        }

        /* 目次エリア */
        .index-container { margin-top: 40px; }
        .index-list { list-style: none; padding: 0; }
        .index-list li { 
            border-bottom: 1px solid #f2f2f2; 
            padding: 15px 5px; 
        }
        .index-list a { text-decoration: none; color: #0055aa; font-weight: bold; font-size: 17px; }
        .index-list span { font-size: 14px; color: #999; margin-left: 15px; }

        /* 短編用ボタン */
        .read-button { 
            display: inline-block; 
            background: #444; 
            color: #fff; 
            padding: 12px 30px; 
            text-decoration: none; 
            border-radius: 4px; 
            margin-top: 10px; 
            font-weight: bold; 
            font-size: 16px;
        }

        /* 最下部：上へ・戻る */
        .bottom-nav {
            text-align: center;
            margin-top: 100px;
            padding-bottom: 80px;
        }
        .bottom-nav a {
            display: block;
            text-decoration: none;
            margin: 20px 0;
        }
        /* 「上へ」：下へと同じ「脇役の濃さ」で統一 */
        .go-top { 
            font-size: 14px; 
            color: #777; 
            font-weight: bold;
        } 
        /* 「← 戻る」：少しだけ濃くし、安心感を与える */
        .back-link { 
            font-size: 16px; 
            color: #666; 
            font-weight: bold;
        }
    </style>
</head>
<body id="top">

    <h1 class="novel-title">作品名</h1>

    <div class="story-summary">
        ここにあらすじを記入してください。
    </div>

    <div class="jump-link">
        <a href="#footer">▼ 下へ</a>
    </div>

    <div class="index-container">
        <ul class="index-list">
            <li><a href="novel_part1.html">第１回：サブタイトル</a><span>2026/04/04</span></li>
            <li><a href="novel_part2.html">第２回：サブタイトル</a><span>2026/04/05</span></li>
        </ul>
    </div>

    <div class="bottom-nav" id="footer">
        <a href="#top" class="go-top">▲ ページの上へ</a>
        <a href="index.html" class="back-link">← 戻る</a>
    </div>

</body>
</html>
