<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ギャラリー</title>
  <style>
    body {
      font-family: sans-serif; 
      line-height: 1.8; 
      max-width: 800px; 
      margin: 0 auto; 
      padding: 20px; 
      color: #222; 
      background: #fff;
    }

    /* header全体を中央寄せにする */
    header { text-align: center; margin-bottom: 40px; }

    .intro { margin: 30px 0; font-size: 16px; }
    .intro span { display: inline-block; }

    .category { text-align: left; margin-bottom: 40px; }
    .category h2 { 
      font-size: 20px; 
      padding-left: 12px; 
      border-left: 5px solid #f8b500; /* 太すぎたので調整 */
      line-height: 1.2; 
      margin-bottom: 15px; 
    }
    
    .category ul { list-style: disc; padding-left: 25px; }
    .category a { text-decoration: none; color: #0055aa; font-weight: bold; }
    .back-to-top { font-size: 14px; text-decoration: none; }
  </style>
</head>

<body>
  <header>
    <img src="image/saka-kemomimi.png" alt="坂道の女子たち" style="width: 100%; height: auto; border-radius: 8px;">
    <div class="intro">
      <span>よくここまでたどりつきましたね。</span><br>
      <span>ここはAIイラストをのせる場です。</span><br>
      <span>どうぞごゆるりと、お楽しみください。</span>
    </div>
  </header>

  <main> 
    <section class="category">
      <h2>漫画</h2>
      <ul>
        <li><a href="#">作品タイトル（準備中）</a></li>
      </ul>
    </section>

    <section class="category">
      <h2>小説</h2>
      <ul>
        <li><a href="#">作品タイトル（準備中）</a></li>
      </ul>
    </section>
  </main>

  <footer>
    <div class="bottom-nav" id="footer" style="text-align: center;">
      <hr>
      <a href="index.html" class="back-to-top">トップへ戻る</a>
    </div>
  </footer>
</body>
</html>
