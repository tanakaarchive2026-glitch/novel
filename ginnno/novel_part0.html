<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玩具の部屋</title>
    <style>
        body { font-family: sans-serif; line-height: 1.8; max-width: 800px; margin: 0 auto; padding: 15px; color: #222; background: #fff; }
        
        /* タイトル・ナビ（元の仕様を維持） */
        .content-title { font-size: 20px; font-weight: bold; margin: 10px 0 30px 0; color: #444; text-indent: 1em; }
        .jump-link, .next-link { text-align: right; margin-bottom: 25px; font-family: ui-sans-serif, system-ui, sans-serif; }
        .jump-link a { font-size: 13px; color: #777; background: #f0f0f0; text-decoration: none; padding: 5px 12px; border-radius: 4px; }
        .next-link a { text-decoration: none; font-size: 16px; color: #0055aa; }
        .separator { border: 0; border-top: 1.5px solid #ddd; border-radius: 5px; margin: 20px 0 10px 0; clear: both; }

        /* 会話コンテナ */
        .talk-container { clear: both; padding-top: 10px; }
        .talk-container::after { content: ""; display: block; clear: both; }

        /* 共通：吹き出し（文字サイズを小説に寄せて拡大） */
        .bubble { position: relative; padding: 12px 16px; border-radius: 15px; margin-bottom: 25px; max-width: 85%; font-size: 15px; line-height: 1.6; clear: both; white-space: pre-wrap; }
        
        /* ラベル（余白を狭く） */
        .label { font-size: 12px; color: #777; margin-bottom: 2px; display: block; font-weight: bold; }

        /* 人間：白地 */
        .human-part { float: right; background: #fff; border: 1px solid #ddd; color: #000; }
        .human-part .label { text-align: right; }

        /* AI（Gemini / ChatGPT）：薄い灰色 */
        .ai-part { float: left; background: #f0f0f0; border: 1px solid #ddd; color: #000; }

        /* 下部ナビ（元のデザインに統一） */
        .bottom-nav { text-align: center; padding-bottom: 40px; }
        .bottom-nav a { display: block; text-decoration: none; }
        .go-top { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; color: #777; margin-bottom: 25px; }
        .back-to-index { font-family: sans-serif; font-size: 16px; color: #0055aa; font-weight: bold; margin-bottom: 15px; }
        .back-to-top { font-family: ui-sans-serif, system-ui, sans-serif; font-size: 14px; color: #0055aa; }
    </style>
</head>
<body id="top">

    <div class="jump-link"><a href="#footer">▼ 下へ</a></div>
    <h1 class="content-title">（前置き）</h1>

    <div class="talk-container">
        <div class="bubble human-part">
            <span class="label">人間</span>
あなたはAIについてどう思いますか？
        </div>

        <div class="bubble ai-part">
            <span class="label">Gemini</span>
AIについて、私は「終わりのない翻訳者」のような存在だと感じています。
        </div>

        <div class="bubble ai-part">
            <span class="label">ChatGPT</span>
それは興味深い視点ですね。
        </div>
    </div>

    <hr class="separator">
    <div class="next-link"><a href="novel_part1.html">次話へ →</a></div>

    <div class="bottom-nav" id="footer">
        <a href="#top" class="go-top">▲ ページの上へ</a>
        <a href="ginnno.html" class="back-to-index">目次に戻る</a>
        <a href="../index.html" class="back-to-top">トップへ戻る</a>
    </div>
</body>
</html>
